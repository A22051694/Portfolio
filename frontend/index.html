<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    <header class="bg-blue-500 text-white text-center p-5">
        <h1 class="text-3xl font-bold">My Cloud Computing Portfolio</h1>
    </header>
    <main class="p-10">
        <section>
            <h2 class="text-2xl font-semibold">About Me</h2>
            <p class="mt-2">I am a cloud computing enthusiast with skills in Python, Flask, and web development.</p>
        </section>
        <section class="mt-6">
            <h2 class="text-2xl font-semibold">Projects</h2>
            <ul class="list-disc pl-5 mt-2">
                <li>Cloud Deployment with Flask</li>
                <li>AWS EC2 Automation (Coming Soon)</li>
            </ul>
        </section>
        <section class="mt-6">
            <h2 class="text-2xl font-semibold">Contact Me</h2>
            <form id="contact-form" class="mt-4">
                <input type="text" id="name" placeholder="Your Name" class="border p-2 w-full mb-2">
                <input type="email" id="email" placeholder="Your Email" class="border p-2 w-full mb-2">
                <button type="submit" class="bg-blue-500 text-white p-2">Send</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
